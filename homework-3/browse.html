    <body>
        <div class="wrapper">
            <main>
                <h1>Browse Items</h1>
                <section>
                    <form class="item-options">
                        <fieldset id="filter" class="hidden">
                            <legend>Filter</legend>

                            <div class="form-option">
                                <input id="smartphone" name="itemFilter" type="checkbox" value="smartphone" checked/>
                                <label for="smartphone">Smartphones</label>
                            </div>
                            
                            <div class="form-option">
                                <input id="laptop" name="itemFilter" type="checkbox" value="laptop" checked/>
                                <label for="laptop">Laptops</label>
                            </div>
                        </fieldset>

                        <fieldset id="sort" class="hidden">
                            <legend>Sort</legend>

                            <div class="form-option">
                                <input id="ascending" name="itemSort" type="radio" value="ascending" checked/>
                                <label for="ascending">Price: Low to High</label>
                            </div>
                            
                            <div class="form-option">
                                <input id="descending" name="itemSort" type="radio" value="descending" />
                                <label for="descending">Price: High to Low</label>
                            </div>
                        </fieldset>
                    </form>
                </section>
                <section id="items" class="item-container"></section>
            </main>
        </div>
    </body>
